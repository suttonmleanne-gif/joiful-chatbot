<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JoiFul Services — Chat with us</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  min-height: 100vh;
  background: #f5f3ee;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  font-family: 'Nunito', sans-serif;
}

.chat-container {
  width: 100%;
  max-width: 680px;
  display: flex;
  flex-direction: column;
  height: 90vh;
  max-height: 800px;
  box-shadow: 0 8px 48px rgba(27,53,100,0.15);
  border-radius: 20px;
}

.chat-header {
  background: #1B3564;
  border-radius: 20px 20px 0 0;
  padding: 20px 28px 16px;
}

.logo-text {
  font-family: 'Nunito', sans-serif;
  font-weight: 800;
  font-size: 22px;
  margin-bottom: 10px;
}

.logo-text .joi { color: #ffffff; }
.logo-text .ful { color: #ffffff; }
.logo-text .services { color: #7CA8E0; }

.status-line { display: flex; align-items: center; }

.status-dot {
  width: 8px;
  height: 8px;
  background: #4ade80;
  border-radius: 50%;
  display: inline-block;
  margin-right: 6px;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

.status-text {
  font-family: 'Nunito', sans-serif;
  font-size: 11px;
  color: rgba(255,255,255,0.7);
  letter-spacing: 1px;
}

.messages-area {
  flex: 1;
  overflow-y: auto;
  padding: 24px 20px;
  background: #faf9f6;
  scrollbar-width: thin;
  scrollbar-color: rgba(27,53,100,0.2) transparent;
}

.messages-area::-webkit-scrollbar { width: 4px; }
.messages-area::-webkit-scrollbar-thumb { background: rgba(27,53,100,0.25); border-radius: 2px; }

.time-badge {
  text-align: center;
  margin: 8px 0 16px;
  font-family: 'Nunito', sans-serif;
  font-size: 10px;
  color: rgba(60,60,60,0.45);
  letter-spacing: 1px;
}

.message-row {
  display: flex;
  margin-bottom: 18px;
  animation: fadeUp 0.3s ease;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.message-row.user { justify-content: flex-end; }
.message-row.assistant { justify-content: flex-start; align-items: flex-end; }

.joiful-avatar {
  width: 32px;
  height: 32px;
  background: #1B3564;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  margin-right: 10px;
  flex-shrink: 0;
  color: #ffffff;
  font-weight: 700;
}

.message-bubble {
  max-width: 78%;
  padding: 14px 18px;
  border-radius: 18px;
  font-family: 'Nunito', sans-serif;
  font-size: 14px;
  line-height: 1.7;
  font-weight: 400;
}

.message-bubble.user {
  background: #478CD7;
  color: #ffffff;
  border-radius: 18px 18px 4px 18px;
}

.message-bubble.assistant {
  background: #ffffff;
  color: #2b2b2b;
  border-radius: 18px 18px 18px 4px;
  border: 1px solid rgba(27,53,100,0.12);
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}

.suggestions-area {
  padding: 12px 20px 4px;
  background: #faf9f6;
  border-top: 1px solid rgba(27,53,100,0.08);
}

.suggestions-label {
  font-family: 'Nunito', sans-serif;
  font-size: 10px;
  color: rgba(60,60,60,0.5);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 8px;
  font-weight: 600;
}

.suggestions-scroll {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding-bottom: 8px;
  scrollbar-width: none;
}

.suggestions-scroll::-webkit-scrollbar { display: none; }

.suggestion-chip {
  flex-shrink: 0;
  padding: 7px 14px;
  background: #ffffff;
  border: 1px solid rgba(27,53,100,0.3);
  border-radius: 20px;
  color: #1B3564;
  font-family: 'Nunito', sans-serif;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s ease;
  white-space: nowrap;
}

.suggestion-chip:hover {
  background: #1B3564;
  color: #ffffff;
  transform: translateY(-1px);
}

.input-area {
  background: #ffffff;
  border-top: 1px solid rgba(27,53,100,0.1);
  border-radius: 0 0 20px 20px;
  padding: 16px 20px;
  display: flex;
  gap: 12px;
  align-items: flex-end;
}

.input-field {
  flex: 1;
  background: #f5f3ee;
  border: 1px solid rgba(27,53,100,0.2);
  border-radius: 14px;
  padding: 12px 16px;
  color: #2b2b2b;
  font-family: 'Nunito', sans-serif;
  font-size: 14px;
  font-weight: 400;
  resize: none;
  outline: none;
  min-height: 46px;
  max-height: 120px;
  transition: border-color 0.2s;
  line-height: 1.5;
}

.input-field::placeholder { color: rgba(60,60,60,0.4); }
.input-field:focus { border-color: rgba(71,140,215,0.6); }

.send-button {
  width: 46px;
  height: 46px;
  background: #1B3564;
  border: none;
  border-radius: 13px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s ease;
  flex-shrink: 0;
  box-shadow: 0 4px 12px rgba(27,53,100,0.3);
}

.send-button:hover:not(:disabled) {
  background: #122548;
  transform: translateY(-1px);
}

.send-button:disabled { opacity: 0.4; cursor: not-allowed; }

.typing-indicator { display: flex; gap: 4px; padding: 4px 2px; align-items: center; }

.typing-dot {
  width: 7px;
  height: 7px;
  background: rgba(27,53,100,0.5);
  border-radius: 50%;
  animation: typing 1.2s infinite;
}

.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes typing {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
  30% { transform: translateY(-5px); opacity: 1; }
}
</style>
</head>
<body>
<div class="chat-container">
  <div class="chat-header">
    <div class="logo-text"><span class="joi">Joi</span><span class="ful">Ful</span> <span class="services">Services</span></div>
    <div class="status-line">
      <span class="status-dot"></span>
      <span class="status-text">We're online — ask us anything</span>
    </div>
  </div>

  <div class="messages-area" id="messages">
    <div class="time-badge">TODAY</div>
    <div class="message-row assistant">
      <div class="joiful-avatar">JF</div>
      <div class="message-bubble assistant">Hi! Thanks for stopping by JoiFul Services. We handle cleaning, turnovers, maintenance, lawn care, and PadSplit setup across Atlanta and the surrounding area. What can I help you with today?</div>
    </div>
  </div>

  <div class="suggestions-area" id="suggestions">
    <div class="suggestions-label">Try asking</div>
    <div class="suggestions-scroll">
      <button class="suggestion-chip" onclick="sendSuggestion(this)">What services do you offer?</button>
      <button class="suggestion-chip" onclick="sendSuggestion(this)">Do you do Airbnb turnovers?</button>
      <button class="suggestion-chip" onclick="sendSuggestion(this)">What areas do you serve?</button>
      <button class="suggestion-chip" onclick="sendSuggestion(this)">How much does it cost?</button>
      <button class="suggestion-chip" onclick="sendSuggestion(this)">PadSplit setup help?</button>
      <button class="suggestion-chip" onclick="sendSuggestion(this)">Get a quote</button>
    </div>
  </div>

  <div class="input-area">
    <textarea class="input-field" id="input" placeholder="Ask about services, your property, or get a quote..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-button" id="sendBtn" onclick="sendMessage()" disabled>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <path d="M22 2L11 13" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>
</div>

<script>
const SYSTEM_PROMPT = "This is handled server-side in api/chat.js. Do not edit this line, it is not used.";

let messages = [];
let loading = false;

const input = document.getElementById("input");
const sendBtn = document.getElementById("sendBtn");
const messagesArea = document.getElementById("messages");
const suggestions = document.getElementById("suggestions");

input.addEventListener("input", () => {
  sendBtn.disabled = !input.value.trim() || loading;
});

function autoResize(el) {
  el.style.height = "auto";
  el.style.height = Math.min(el.scrollHeight, 120) + "px";
}

function handleKey(e) {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    if (!sendBtn.disabled) sendMessage();
  }
}

function sendSuggestion(btn) { sendMessage(btn.textContent); }

function addMessage(role, content) {
  const row = document.createElement("div");
  row.className = "message-row " + role;
  if (role === "assistant") {
    const avatar = document.createElement("div");
    avatar.className = "joiful-avatar";
    avatar.textContent = "JF";
    row.appendChild(avatar);
  }
  const bubble = document.createElement("div");
  bubble.className = "message-bubble " + role;
  bubble.innerHTML = content.replace(/\n/g, "<br>");
  row.appendChild(bubble);
  messagesArea.appendChild(row);
  messagesArea.scrollTop = messagesArea.scrollHeight;
}

function showTyping() {
  const row = document.createElement("div");
  row.className = "message-row assistant";
  row.id = "typing";
  const avatar = document.createElement("div");
  avatar.className = "joiful-avatar";
  avatar.textContent = "JF";
  row.appendChild(avatar);
  const bubble = document.createElement("div");
  bubble.className = "message-bubble assistant";
  bubble.innerHTML = "<div class=\"typing-indicator\"><div class=\"typing-dot\"></div><div class=\"typing-dot\"></div><div class=\"typing-dot\"></div></div>";
  row.appendChild(bubble);
  messagesArea.appendChild(row);
  messagesArea.scrollTop = messagesArea.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById("typing");
  if (t) t.remove();
}

async function sendMessage(text) {
  const userText = text || input.value.trim();
  if (!userText || loading) return;
  input.value = "";
  input.style.height = "auto";
  sendBtn.disabled = true;
  suggestions.style.display = "none";
  loading = true;
  messages.push({ role: "user", content: userText });
  addMessage("user", userText);
  showTyping();
  try {
    const response = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ messages: messages })
    });
    const data = await response.json();
    const reply = data.reply || "Sorry, I had trouble with that. Please try again, or call us directly at (470) 702-8757!";
    removeTyping();
    messages.push({ role: "assistant", content: reply });
    addMessage("assistant", reply);
  } catch(e) {
    removeTyping();
    addMessage("assistant", "Something went wrong. Please try again, or call us directly at (470) 702-8757!");
  }
  loading = false;
  sendBtn.disabled = !input.value.trim();
  input.focus();
}
</script>
</body>
</html>
