<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>JoiFul Services Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito Sans', sans-serif;
      background: #FEFCF8;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    #chat-header {
      background: #1B3564;
      color: #FEFCF8;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    #chat-header .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #478CD7;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 16px;
      color: #FEFCF8;
      font-family: 'Nunito', sans-serif;
    }

    #chat-header .info .name {
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: 16px;
    }

    #chat-header .info .status {
      font-size: 12px;
      color: #6B7A3E;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    #chat-header .info .status::before {
      content: '';
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #6B7A3E;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.5;
      color: #1B3564;
    }

    .message.bot {
      background: #fff;
      border: 1px solid #e8e4de;
      border-bottom-left-radius: 4px;
      align-self: flex-start;
    }

    .message.user {
      background: #1B3564;
      color: #FEFCF8;
      border-bottom-right-radius: 4px;
      align-self: flex-end;
    }

    .message.typing {
      background: #fff;
      border: 1px solid #e8e4de;
      border-bottom-left-radius: 4px;
      align-self: flex-start;
      color: #999;
      font-style: italic;
    }

    #suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 0 16px 12px;
      flex-shrink: 0;
    }

    .suggestion-btn {
      background: #fff;
      border: 1px solid #478CD7;
      color: #1B3564;
      border-radius: 20px;
      padding: 8px 14px;
      font-size: 13px;
      cursor: pointer;
      font-family: 'Nunito Sans', sans-serif;
      transition: background 0.15s, color 0.15s;
    }

    .suggestion-btn:hover {
      background: #478CD7;
      color: #fff;
    }

    #input-area {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      border-top: 1px solid #e8e4de;
      background: #FEFCF8;
      flex-shrink: 0;
    }

    #user-input {
      flex: 1;
      border: 1px solid #d0ccc5;
      border-radius: 24px;
      padding: 10px 16px;
      font-size: 14px;
      font-family: 'Nunito Sans', sans-serif;
      color: #1B3564;
      background: #fff;
      outline: none;
      resize: none;
      line-height: 1.4;
    }

    #user-input:focus {
      border-color: #478CD7;
    }

    #send-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #1B3564;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
    }

    #send-btn:hover {
      background: #478CD7;
    }

    #send-btn svg {
      width: 18px;
      height: 18px;
      fill: #FEFCF8;
    }

    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@900&family=Nunito+Sans:wght@400;600&display=swap');
  </style>
</head>
<body>

<div id="chat-header">
  <div class="avatar">JF</div>
  <div class="info">
    <div class="name">JoiFul Services</div>
    <div class="status">Online now</div>
  </div>
</div>

<div id="messages"></div>

<div id="suggestions">
  <button class="suggestion-btn" onclick="sendSuggestion('What services do you offer?')">What services do you offer?</button>
  <button class="suggestion-btn" onclick="sendSuggestion('Do you do Airbnb turnovers?')">Do you do Airbnb turnovers?</button>
  <button class="suggestion-btn" onclick="sendSuggestion('What areas do you serve?')">What areas do you serve?</button>
  <button class="suggestion-btn" onclick="sendSuggestion('How does pricing work?')">How does pricing work?</button>
</div>

<div id="input-area">
  <textarea id="user-input" rows="1" placeholder="Ask about services, pricing, or your property..."></textarea>
  <button id="send-btn" onclick="sendMessage()">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M2 21l21-9L2 3v7l15 2-15 2z"/>
    </svg>
  </button>
</div>

<script>
  const MAKE_WEBHOOK = 'https://hook.us2.make.com/dpq5g5vj3p0r59d0m9c8ahxcw2cngr5q';
  const conversationHistory = [];

  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('user-input');

  function addMessage(text, role) {
    const div = document.createElement('div');
    div.className = `message ${role}`;
    div.textContent = text;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  function showTyping() {
    const div = document.createElement('div');
    div.className = 'message typing';
    div.id = 'typing-indicator';
    div.textContent = 'JoiFul Services is typing...';
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById('typing-indicator');
    if (el) el.remove();
  }

  function extractAndFireLead(text) {
    const match = text.match(/%%LEAD%%({.*?})%%END%%/s);
    if (!match) return text;

    try {
      const lead = JSON.parse(match[1]);
      fetch(MAKE_WEBHOOK, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name: lead.name,
          contact: lead.contact,
          service: lead.service,
          source: 'JoiFul Chatbot',
          timestamp: new Date().toISOString()
        })
      }).catch(err => console.error('Webhook error:', err));
    } catch (e) {
      console.error('Lead parse error:', e);
    }

    return text.replace(/%%LEAD%%.*?%%END%%/s, '').trim();
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;

    document.getElementById('suggestions').style.display = 'none';
    inputEl.value = '';
    inputEl.style.height = 'auto';

    addMessage(text, 'user');
    conversationHistory.push({ role: 'user', content: text });

    showTyping();

    try {
      const response = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: conversationHistory })
      });

      const data = await response.json();
      removeTyping();

      const rawReply = data.reply || 'Sorry, something went wrong. Please try again.';
      const cleanReply = extractAndFireLead(rawReply);

      addMessage(cleanReply, 'bot');
      conversationHistory.push({ role: 'assistant', content: cleanReply });

    } catch (err) {
      removeTyping();
      addMessage('Something went wrong. Please try again or call us at (470) 702-8757.', 'bot');
      console.error(err);
    }
  }

  function sendSuggestion(text) {
    inputEl.value = text;
    sendMessage();
  }

  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  });

  window.addEventListener('load', () => {
    const welcome = "Hi! Thanks for stopping by JoiFul Services. We handle cleaning, turnovers, maintenance, lawn care, and PadSplit setup across Atlanta and the surrounding area. What can I help you with today?";
    addMessage(welcome, 'bot');
    conversationHistory.push({ role: 'assistant', content: welcome });
  });
</script>

</body>
</html>
